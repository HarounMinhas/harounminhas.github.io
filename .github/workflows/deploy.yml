name: Deploy portfolio site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Build Phase10
        run: |
          cd phase10
          pnpm install --frozen-lockfile || pnpm install
          pnpm run build

      - name: Prepare deployment folder
        run: |
          rm -rf deploy
          mkdir -p deploy

          # Portfolio homepage
          cp portfolio-index.html deploy/index.html

          # Statische projectmappen
          for dir in MusicDiscovery workforce-scheduler regex-playground zen-writer colorhunt; do
            if [ -d "$dir" ]; then
              mkdir -p "deploy/$dir"
              cp -R "$dir/"* "deploy/$dir/" || true
            fi
          done

          # Phase10: neem build output, niet de broncode
          if [ -d "phase10/dist" ]; then
            mkdir -p deploy/phase10
            cp -R phase10/dist/* deploy/phase10/
          fi

          touch deploy/.nojekyll

          echo "Deployment structure:"
          find deploy -maxdepth 3 -type f | sort | head -300

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4