name: Deploy portfolio site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4

      - name: Prepare deployment folder
        run: |
          rm -rf deploy
          mkdir -p deploy

          # Portfolio homepage
          cp portfolio-index.html deploy/index.html

          # Statische projectmappen meenemen als ze bestaan
          for dir in MusicDiscovery workforce-scheduler regex-playground zen-writer colorhunt phase10; do
            if [ -d "$dir" ]; then
              mkdir -p "deploy/$dir"
              cp -R "$dir/"* "deploy/$dir/" || true
            fi
          done

          touch deploy/.nojekyll

          echo "Deployment structure:"
          find deploy -maxdepth 2 -type f | sort | head -200

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4