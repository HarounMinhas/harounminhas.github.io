name: Deploy portfolio site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build portfolio
        run: pnpm run build

      - name: Prepare deployment folder
        run: |
          rm -rf deploy
          mkdir -p deploy

          # CRA output staat in build/
          cp -R build/* deploy/

          # MusicDiscovery submap behouden
          if [ -d "MusicDiscovery" ]; then
            mkdir -p deploy/MusicDiscovery
            cp -R MusicDiscovery/* deploy/MusicDiscovery/
          fi

          touch deploy/.nojekyll

          echo "Deployment structure:"
          find deploy -maxdepth 2 -type f | sort | head -200

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4