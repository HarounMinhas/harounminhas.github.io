name: MusicDiscovery PR Checks

on:
  pull_request:
    paths:
      - 'MusicDiscovery/**'
      - '.github/workflows/musicdiscovery-pr-check.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: ./MusicDiscovery
        run: pnpm install --frozen-lockfile

      - name: Type check all packages
        working-directory: ./MusicDiscovery
        run: pnpm run type-check

      - name: Build API
        working-directory: ./MusicDiscovery
        run: pnpm --filter @musicdiscovery/api build

      - name: Build Web
        working-directory: ./MusicDiscovery
        run: pnpm --filter @musicdiscovery/web build

      - name: Run tests
        working-directory: ./MusicDiscovery
        run: pnpm test

      - name: Comment PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = `${emoji} **MusicDiscovery Build ${status === 'success' ? 'Passed' : 'Failed'}**\n\nAll TypeScript compilation and tests completed ${status === 'success' ? 'successfully' : 'with errors'}.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
