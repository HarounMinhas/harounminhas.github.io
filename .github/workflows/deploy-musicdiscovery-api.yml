name: Deploy MusicDiscovery API to Render

on:
  push:
    branches: ["main"]
    paths:
      - 'MusicDiscovery/**'
      - '.github/workflows/deploy-musicdiscovery-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: ./MusicDiscovery
        run: pnpm install --frozen-lockfile

      - name: Build API
        working-directory: ./MusicDiscovery
        run: pnpm --filter @musicdiscovery/api build

      - name: Run API tests
        working-directory: ./MusicDiscovery
        run: pnpm --filter @musicdiscovery/api test

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
